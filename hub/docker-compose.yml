# Farm Netwatch HUB — central multi-site dashboard + WireGuard server (wg-easy).
#
#   cp .env.example .env     # set WG_HOST, WG_PASSWORD_HASH, HUB_PASSWORD
#   docker compose up -d --build
#
# The hub app runs INSIDE wg-easy's network namespace (network_mode: service:)
# because that is where the wg0 interface (10.8.0.1) lives — it is the only way
# the hub can reach the sites' 10.8.0.x addresses. Two consequences:
#   * the hub's UI port is published on the wg-easy service, not on `hub`;
#   * NEVER recreate wg-easy alone — always `docker compose up -d` from this
#     directory so compose recreates ALL THREE (wg-easy, hub, hub-proxy) and the
#     shared netns stays valid.
#
# hub-proxy (Caddy) ALSO shares wg-easy's netns: it reverse-proxies each VPN
# site's Netwatch/Kuma to LAN ports so a browser can reach them without being a
# VPN client. Its listen ports are published on wg-easy (the netns owner) as the
# 8200-8231 range; the hub assigns ports within it and generates Caddy's config.
services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: hub-wg-easy
    environment:
      - WG_HOST=${WG_HOST:?set WG_HOST in hub/.env — your public IP or DDNS name}
      - PASSWORD_HASH=${WG_PASSWORD_HASH:?see .env.example — generate with wgpw}
      - PORT=51821
      - WG_PORT=51820
      - WG_DEFAULT_ADDRESS=10.8.0.x
      # SPLIT TUNNEL — clients route only the VPN subnet through the tunnel.
      # Must be set BEFORE creating clients (wg-easy stamps it into each conf).
      # Full tunnel would route the farms' internet through this Pi AND break
      # the site-side wg-client container (host netns, no sysctls allowed).
      - WG_ALLOWED_IPS=10.8.0.0/24
      - WG_PERSISTENT_KEEPALIVE=25
    volumes:
      - ./data/wg-easy:/etc/wireguard
    ports:
      - "51820:51820/udp"          # WireGuard — forward this on the router
      - "51821:51821/tcp"          # wg-easy admin UI (LAN/VPN only, do NOT forward)
      - "${HUB_PORT:-8091}:8091"   # hub dashboard (published here: shared netns)
      # Reverse-proxy ports for site dashboards (hub-proxy/Caddy binds within this
      # range; the hub assigns per-site). MUST match HUB_PROXY_RANGE on `hub`.
      # LAN-only — do NOT forward these on the router.
      - "8200-8231:8200-8231"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1                  # hub<->site and site<->site routing
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped

  hub:
    image: ${HUB_IMAGE:-ghcr.io/riaan007/farm-netwatch-hub:latest}
    build:
      context: ..
      dockerfile: hub/Dockerfile
    container_name: netwatch-hub
    network_mode: service:wg-easy
    depends_on:
      - wg-easy
    environment:
      - HUB_PORT=8091
      - HUB_PASSWORD=${HUB_PASSWORD:-}   # seeds the login on first boot only
      - WG_PASSWORD=${WG_PASSWORD:-}     # lets the add-site wizard drive wg-easy's API
      # The bare-Pi installer the add-site wizard points new sites at (override for a fork).
      - NETWATCH_INSTALL_URL=${NETWATCH_INSTALL_URL:-https://raw.githubusercontent.com/Riaan007/farm-netwatch/main/install.sh}
      # Reverse-proxy port range — MUST match the published range on wg-easy above.
      - HUB_PROXY_RANGE=${HUB_PROXY_RANGE:-8200-8231}
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/hub:/data
    restart: unless-stopped

  # Caddy reverse proxy: serves each VPN site's Netwatch/Kuma on a LAN port so a
  # browser reaches them without a VPN client. Shares wg-easy's netns to reach
  # 10.8.0.x over wg0 and to expose the 8200-8231 ports published on wg-easy. The
  # hub writes ./data/hub/caddy/Caddyfile and hot-reloads via Caddy's admin API
  # (localhost:2019, same netns). Each proxied port is gated by Basic Auth with the
  # hub password (admin / <hub password>).
  hub-proxy:
    image: caddy:2-alpine
    container_name: hub-proxy
    network_mode: service:wg-easy
    depends_on:
      - wg-easy
      - hub
    # Wait for the hub to generate the Caddyfile on first boot (it's persisted in
    # the volume thereafter), then run. Live updates come via the admin API.
    command: ["sh", "-c", "while [ ! -f /etc/caddy/Caddyfile ]; do sleep 1; done; exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile"]
    volumes:
      - ./data/hub/caddy:/etc/caddy      # hub writes Caddyfile here
      - ./data/hub/caddy/data:/data      # Caddy's own data dir
    restart: unless-stopped
