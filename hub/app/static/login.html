<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="dark">
    <meta name="theme-color" content="#070b14">
    <title>Farm Network Asset Identifier · Hub</title>
    <link rel="icon" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40"><path d="M20 3 34 11v18L20 37 6 29V11z" fill="none" stroke="%2322d3ee" stroke-width="3"/><circle cx="20" cy="20" r="5" fill="%2334d399"/></svg>'>
    <link rel="stylesheet" href="/app.css">
    <style>
        :root { color-scheme: dark; }
        body { background-color: #070b14; }
        .bg-noc { position: fixed; inset: 0; z-index: -2; pointer-events: none;
            background:
                radial-gradient(1100px 520px at 12% -10%, rgba(34,211,238,.14), transparent 60%),
                radial-gradient(900px 480px at 88% -5%, rgba(99,102,241,.12), transparent 55%),
                radial-gradient(800px 700px at 50% 115%, rgba(16,185,129,.07), transparent 60%); }
        .bg-grid { position: fixed; inset: 0; z-index: -1; pointer-events: none;
            background-image:
                linear-gradient(rgba(148,163,184,.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148,163,184,.05) 1px, transparent 1px);
            background-size: 34px 34px;
            -webkit-mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 25%, transparent 78%);
            mask-image: radial-gradient(ellipse 90% 70% at 50% 0%, black 25%, transparent 78%); }
        .modal-card { background: rgba(10,16,30,.92); border: 1px solid rgba(148,163,184,.16);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 24px 70px -20px rgba(0,0,0,.85), 0 0 0 1px rgba(34,211,238,.06); }
        .brand-text { background: linear-gradient(90deg, #67e8f9, #bae6fd 45%, #6ee7b7);
            -webkit-background-clip: text; background-clip: text; color: transparent; }
        .hdr-line { height: 1px; background: linear-gradient(90deg, transparent, rgba(34,211,238,.55), rgba(16,185,129,.4), transparent); }
        .inp { background: rgba(2,6,23,.65); border: 1px solid rgba(148,163,184,.2); color: #e2e8f0;
            border-radius: .6rem; padding: .7rem .8rem; font-size: .9rem; width: 100%;
            transition: border-color .15s, box-shadow .15s; }
        .inp::placeholder { color: #475569; }
        .inp:focus { outline: none; border-color: rgba(34,211,238,.55); box-shadow: 0 0 0 3px rgba(34,211,238,.14); }
        .btn-primary { display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
            border-radius: .7rem; cursor: pointer; font-weight: 700; letter-spacing: .06em; text-transform: uppercase;
            background: linear-gradient(135deg, #0ea5e9, #06b6d4); color: #03141c;
            border: 1px solid rgba(103,232,249,.4); box-shadow: 0 2px 14px -4px rgba(34,211,238,.55);
            transition: all .15s ease; }
        .btn-primary:hover { filter: brightness(1.12); box-shadow: 0 4px 20px -4px rgba(34,211,238,.7); }
    </style>
</head>
<body class="min-h-screen font-sans text-slate-200 flex items-center justify-center p-4 antialiased selection:bg-cyan-500/30">
    <div class="bg-noc"></div>
    <div class="bg-grid"></div>

    <div class="modal-card rounded-2xl max-w-sm w-full overflow-hidden">
        <div class="p-6 pb-5">
            <div class="flex items-center gap-3">
                <svg viewBox="0 0 40 40" class="w-11 h-11 shrink-0">
                    <defs><linearGradient id="lg-brand" x1="0" y1="0" x2="1" y2="1">
                        <stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#34d399"/>
                    </linearGradient></defs>
                    <path d="M20 3 34 11v18L20 37 6 29V11z" fill="none" stroke="url(#lg-brand)" stroke-width="1.6" opacity=".9"/>
                    <circle cx="20" cy="20" r="9" fill="none" stroke="url(#lg-brand)" stroke-width="1.1" opacity=".5"/>
                    <circle cx="20" cy="20" r="4.5" fill="none" stroke="url(#lg-brand)" stroke-width="1.1" opacity=".75"/>
                    <circle cx="20" cy="20" r="1.8" fill="#22d3ee"/>
                    <path d="M20 20 31 13" stroke="#22d3ee" stroke-width="1.4" stroke-linecap="round" opacity=".9"/>
                </svg>
                <div>
                    <h1 class="text-lg font-bold tracking-tight brand-text">Farm Network Asset Identifier</h1>
                    <p class="text-slate-500 text-[10px] mt-0.5 font-bold uppercase tracking-[0.25em]">Central Hub</p>
                </div>
            </div>
        </div>
        <div class="hdr-line"></div>
        <form id="login-form" class="p-6 space-y-4" onsubmit="return doLogin(event)">
            <p id="mode-hint" class="text-sm text-slate-400">Enter the hub password.</p>
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Password</label>
                <input id="password" type="password" autocomplete="current-password" autofocus
                       class="inp font-mono">
            </div>
            <div id="confirm-wrap" class="hidden">
                <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Confirm password</label>
                <input id="confirm" type="password" autocomplete="new-password"
                       class="inp font-mono">
            </div>
            <p id="login-error" class="text-xs text-rose-400 font-bold hidden"></p>
            <button id="login-btn" type="submit" class="btn-primary w-full py-3 text-sm">
                Sign in
            </button>
        </form>
    </div>

    <script>
        let createMode = false;

        async function init(){
            const st = await fetch('/api/auth-state').then(r => r.json());
            if (st.logged_in) { location.href = '/'; return; }
            createMode = !st.password_set;
            if (createMode) {
                document.getElementById('mode-hint').textContent =
                    'First run — choose a hub password (minimum 8 characters).';
                document.getElementById('confirm-wrap').classList.remove('hidden');
                document.getElementById('login-btn').textContent = 'Set password & sign in';
            }
        }

        async function doLogin(e){
            e.preventDefault();
            const body = { password: document.getElementById('password').value };
            if (createMode) body.confirm = document.getElementById('confirm').value;
            const r = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
            const res = await r.json();
            if (res.ok) { location.href = '/'; return false; }
            const err = document.getElementById('login-error');
            err.textContent = res.error || 'Login failed';
            err.classList.remove('hidden');
            return false;
        }

        init();
    </script>
</body>
</html>
