name: build-and-push

# Builds the multi-arch image and pushes it to GitHub Container Registry (GHCR)
# so any Raspberry Pi can `docker pull` a prebuilt image instead of compiling.
on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (arm emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/farm-netwatch
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Pi 3 (32-bit OS) = arm/v7; Pi 3-5 (64-bit OS) = arm64; amd64 for testing.
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # HUB image (hub/ stack: multi-site dashboard). 64-bit only — bcrypt ships
      # no armv7 wheels, and a hub realistically runs on a Pi 4/5 with 64-bit OS.
      # ONE-TIME after the first push: a brand-new GHCR package defaults to
      # PRIVATE — flip it to Public (package settings) or install-hub.sh's
      # anonymous `docker compose pull` fails for everyone.
      - name: Hub image metadata
        id: meta_hub
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/farm-netwatch-hub
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push (hub image)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: hub/Dockerfile
          platforms: linux/arm64,linux/amd64
          push: true
          tags: ${{ steps.meta_hub.outputs.tags }}
          labels: ${{ steps.meta_hub.outputs.labels }}
          # own cache scope so the hub build doesn't evict the site image's cache
          cache-from: type=gha,scope=hub
          cache-to: type=gha,mode=max,scope=hub

      # Second variant WITH NetworkManager/nmcli baked in, for the DHCP<->fixed-IP
      # control (docker-compose.netcfg.yml) on sites that run the prebuilt image
      # and have no source checkout to build from.
      - name: Build and push (netcfg variant)
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm/v7,linux/arm64,linux/amd64
          push: true
          build-args: |
            INSTALL_NM=1
          # literal owner, lowercased: repository_owner is "Riaan007" and image
          # tags must be lowercase (metadata-action lowercases; a raw tag doesn't)
          tags: ghcr.io/riaan007/farm-netwatch:netcfg
          cache-from: type=gha
          cache-to: type=gha,mode=max
