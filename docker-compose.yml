# Farm Netwatch — network scanner + dashboard, with optional VPN sidecars.
#
#   docker compose up -d                 # dashboard only (default)
#   docker compose --profile tailscale up -d
#   docker compose --profile wireguard up -d   # inbound VPN *server* (standalone sites)
#   docker compose --profile wg-client up -d   # dial out to the central hub (see hub/)
#   docker compose --profile kuma up -d  # + Uptime Kuma (history/status pages)
#
# The image is pulled from GHCR by default; `build: .` lets any Pi build locally.
services:
  netwatch:
    image: ${NETWATCH_IMAGE:-ghcr.io/riaan007/farm-netwatch:latest}
    build:
      context: .
    container_name: netwatch
    # Host networking is REQUIRED: it lets nmap do ARP sweeps and see real MAC
    # addresses on the local segment (bridge mode would hide them).
    network_mode: host
    cap_add:
      - NET_RAW      # raw packets for ARP / SYN / OS-detection scans
      - NET_ADMIN
    environment:
      - NETWATCH_PORT=8090
      - TZ=${TZ:-UTC}            # set TZ in .env (e.g. Africa/Johannesburg) for local times
    volumes:
      - ./data:/data
    restart: unless-stopped

  # --- Optional: Uptime Kuma (uptime history, status pages, notifications) -----
  uptime-kuma:
    # Pinned to the 1.x line on purpose. Kuma 2.x is a rewrite that REMOVED the
    # Socket.IO API Netwatch uses to auto-create / tag / delete monitors, so 2.x
    # breaks that integration (you'd manage monitors by hand in Kuma's UI).
    # 1.23.17 is the newest 1.x. Do NOT bump to :2 / 2.x without re-porting kuma.py.
    image: louislam/uptime-kuma:1.23.17
    container_name: netwatch-kuma
    profiles: ["kuma"]
    ports:
      - "3001:3001"
    volumes:
      - ./data/kuma:/app/data
    restart: unless-stopped
    # First run: open http://<pi>:3001 and create the admin account.
    # Netwatch pushes device status here; Kuma can also HTTP-monitor
    # http://<pi-ip>:8090/api/devices/<key>/health (200=up, 503=down).

  # --- Optional: Tailscale (easiest remote access, no port forwarding) --------
  tailscale:
    image: tailscale/tailscale:latest
    container_name: netwatch-tailscale
    profiles: ["tailscale"]
    hostname: farm-netwatch
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - TS_STATE_DIR=/var/lib/tailscale
    volumes:
      - ./data/tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    restart: unless-stopped
    # After up: docker exec netwatch-tailscale tailscale up --advertise-routes=<your-cidr>

  # --- Optional: WireGuard CLIENT — dials out to the central hub ---------------
  # For sites reporting to a Farm Netwatch HUB (see hub/). No port forwarding is
  # needed at the farm: the client dials the hub and keeps the tunnel open.
  # 1. On the hub's wg-easy UI, create a client for this site and download the conf.
  # 2. Save it as ./data/wg-client/wg_confs/wg0.conf
  #    (it must contain AllowedIPs = 10.8.0.0/24 and PersistentKeepalive = 25).
  # 3. docker compose --profile wg-client up -d
  # Host networking puts the tunnel in the host netns, so Netwatch (8090) and
  # Kuma (3001) become reachable at this site's 10.8.0.x VPN address.
  # NOTE: no `sysctls:` here on purpose — compose rejects it with host
  # networking, and split-tunnel AllowedIPs avoids needing src_valid_mark.
  wg-client:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: netwatch-wg-client
    profiles: ["wg-client"]
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./data/wg-client:/config
      - /lib/modules:/lib/modules:ro
    restart: unless-stopped

  # --- Optional: WireGuard via wg-easy (self-hosted, own admin UI :51821) ------
  wireguard:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: netwatch-wireguard
    profiles: ["wireguard"]
    environment:
      - WG_HOST=${WG_HOST:-CHANGE_ME.duckdns.org}   # your public IP or DDNS name
      - PORT=51821
      - WG_PORT=51820
    volumes:
      - ./data/wireguard:/etc/wireguard
    ports:
      - "51820:51820/udp"
      - "51821:51821/tcp"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
